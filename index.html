<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>圣经讲章资料库｜正式版</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#/" aria-label="返回首页">
      <span class="brand-kicker">Theological Sermon Library</span>
      <span class="brand-title">圣经讲章资料库</span>
      <span class="brand-subtitle">长期维护的圣经讲章资料库</span>
    </a>
    <nav class="top-actions" aria-label="阅读工具">
      <button class="tool-button" id="decreaseFont" type="button" title="字体缩小" aria-label="字体缩小">A-</button>
      <button class="tool-button" id="increaseFont" type="button" title="字体放大" aria-label="字体放大">A+</button>
      <button class="tool-button" id="themeToggle" type="button" title="切换夜间模式" aria-label="切换夜间模式">月</button>
    </nav>
  </header>

  <main class="app-main">
    <section class="search-panel" aria-label="全站搜索">
      <label for="searchInput">搜索</label>
      <input id="searchInput" type="search" placeholder="搜索书卷、章节、讲章题目、作者与正文">
    </section>

    <section class="content-view" id="contentView" aria-live="polite"></section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> 李朝辉。圣经讲章资料库内容仅供个人灵修、学习与教会服事参考。</p>
  </footer>

  <script src="data/library.js"></script>
  <script src="app.js"></script>
</body>
</html>
